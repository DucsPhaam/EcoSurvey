version: '3.9'
name: ecosurvey-prod

services:
  # ── MySQL Database ──────────────────────────────────────────────
  db:
    image: poppy334/ecosurvey-db:latest
    container_name: ecosurvey-db-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-ecosurvey}
      MYSQL_USER: ${DB_USER:-ecosurvey}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ecosurveypass}
    ports:
      - "3307:3306"
    volumes:
      - db_data_prod:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD:-rootpassword}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ecosurvey-net-prod

  # ── Backend API ─────────────────────────────────────────────────
  backend:
    image: poppy334/ecosurvey-backend:latest
    container_name: ecosurvey-backend-prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ecosurvey}
      DB_USER: ${DB_USER:-ecosurvey}
      DB_PASSWORD: ${DB_PASSWORD:-ecosurveypass}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_very_long_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-another_refresh_secret_change_me}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    ports:
      - "5000:5000"
    networks:
      - ecosurvey-net-prod

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    image: poppy334/ecosurvey-frontend:latest
    container_name: ecosurvey-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - ecosurvey-net-prod

volumes:
  db_data_prod:
    name: ecosurvey_prod_db_data

networks:
  ecosurvey-net-prod:
    driver: bridge
    name: ecosurvey-prod-network
