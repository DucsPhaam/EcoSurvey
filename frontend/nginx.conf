server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # CRITICAL: index.html must NEVER be cached by the browser
    # so that new deployments are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # Proxy API requests to backend
    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploaded files
    location /uploads {
        proxy_pass http://backend:5000;
    }

    # Cache hashed static assets for 1 year (safe — filenames change on every build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
