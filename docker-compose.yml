version: '3.9'
name: ecosurvey-release

services:
  # ── MySQL Database ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: ecosurvey-db2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-ecosurvey}
      MYSQL_USER: ${DB_USER:-ecosurvey}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ecosurveypass}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ecosurvey-net

  # ── Backend API ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecosurvey-backend2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ecosurvey}
      DB_USER: ${DB_USER:-ecosurvey}
      DB_PASSWORD: ${DB_PASSWORD:-ecosurveypass}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_very_long_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-another_refresh_secret_change_me}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      UPLOAD_PATH: /app/uploads
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-EcoSurvey <noreply@ecosurvey.edu>}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - ecosurvey-net

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ecosurvey-frontend2
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - ecosurvey-net

volumes:
  db_data:
    name: ecosurvey_release_db_data
  uploads_data:
    name: ecosurvey_release_uploads

networks:
  ecosurvey-net:
    driver: bridge
    name: ecosurvey-release-network
